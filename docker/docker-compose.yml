services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8501:8501"
      - "8100:8100"
    env_file: ../.env
    depends_on:
      chroma:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - MCP_SERVER_URL=http://localhost:8100
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/postgres_checkpointer
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data

    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres_checkpointer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  chroma_data:
  postgres_data:

